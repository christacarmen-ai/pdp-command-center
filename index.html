}
#root {

}

.card2 { background: var(--bg-card2); border: 1px solid var(--border); border-radius: 8px; }

.tgray { background: rgba(67,80,112,0.18); color: var(--text-2); border: 1px solid rgba(67,80,112,0.25); }
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  display: inline-block; flex-shrink: 0; vertical-align: middle;
}
.dg { background: var(--emerald); box-shadow: 0 0 6px rgba(16,185,129,0.6); }
.db { background: var(--blue); box-shadow: 0 0 6px rgba(59,130,246,0.6); animation: blink 2s ease-in-out infinite; }
.da { background: var(--amber); box-shadow: 0 0 6px rgba(245,158,11,0.5); }
.dgray { background: var(--text-3); }
.dv { background: var(--violet); box-shadow: 0 0 6px rgba(139,92,246,0.5); }
@keyframes blink { 0%,100%{opacity:0.65} 50%{opacity:1} }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.fadein { animation: fadeUp 0.35s ease-out both; }
.prog { height: 5px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
.prog-bar { height: 100%; border-radius: 3px; transition: width 1.1s cubic-bezier(0.4,0,0.2,1); }
.nav-tab {
  padding: 7px 14px; border-radius: 7px; font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1px solid transparent; color: var(--text-2);
  transition: all 0.18s; background: none; white-space: nowrap;
}
.nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.nav-tab.active { color: var(--text); background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.28); }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.g4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 14px; }
.g6 { display: grid; grid-template-columns: repeat(6,1fr); gap: 12px; }
.g64 { display: grid; grid-template-columns: 6fr 4fr; gap: 16px; }
.g46 { display: grid; grid-template-columns: 4fr 6fr; gap: 16px; }
.g55 { display: grid; grid-template-columns: 5fr 5fr; gap: 16px; }
.dtable { width: 100%; border-collapse: collapse; font-size: 13px; }

.dtable tr:last-child td { border-bottom: none; }
.dtable tr:hover td { background: rgba(255,255,255,0.015); color: var(--text); }
.sec {

  color: var(--text-3); display: flex; align-items: center; gap: 8px;

.sec::before { content:''; width: 3px; height: 11px; border-radius: 2px; background: var(--blue); flex-shrink: 0; }

  border: 1px solid rgba(59,130,246,0.3);
  border-radius: 12px;

/* ─── SMALL UTILITIES ───────────────────────────────────────────────────── */

function fmt(n)    { return Number(n).toLocaleString(); }
function fmtD(n)   { return '$' + fmt(n); }

function Tag({ t, children }) {
  const cls = { g:'tg', b:'tb', a:'ta', r:'tr', v:'tv', c:'tc', gray:'tgray' }[t] || 'tgray';
  return <span className={`tag ${cls}`}>{children}</span>;
}

function Dot({ t }) {
  const cls = { g:'dg', b:'db', a:'da', gray:'dgray', v:'dv' }[t] || 'dgray';
  return <span className={`dot ${cls}`} />;
}

function Bar({ pct, color }) {
  return (
    <div className="prog">
      <div className="prog-bar" style={{ width: `${Math.min(100, pct || 0)}%`, background: color || 'var(--blue)' }} />
    </div>
  );
}

function StatusTag({ s }) {
  const m = { shipped:['g','Shipped'], active:['b','Active'], upcoming:['a','Upcoming'], planned:['gray','Planned'], queued:['gray','Queued'], deployed:['v','Deployed'] };
  const [t, lbl] = m[s] || ['gray', s];
  return <Tag t={t}>{lbl}</Tag>;
}

/* ─── CHARTS ────────────────────────────────────────────────────────────── */

function RevBarChart() {
  const ref = useRef(null); const chart = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chart.current) { chart.current.destroy(); chart.current = null; }
    chart.current = new Chart(ref.current.getContext('2d'), {
      type: 'bar',
      data: {
        labels: REV.months.map(m => m.label),
        datasets: [
          { label:'Floor',   data: REV.months.map(m=>m.floor),   backgroundColor:'rgba(67,80,112,0.55)', borderColor:'rgba(67,80,112,0.9)', borderWidth:1, borderRadius:4 },
          { label:'Base',    data: REV.months.map(m=>m.base),    backgroundColor:'rgba(59,130,246,0.6)', borderColor:'rgba(59,130,246,0.9)', borderWidth:1, borderRadius:4 },
          { label:'Ceiling', data: REV.months.map(m=>m.ceiling), backgroundColor:'rgba(16,185,129,0.45)',borderColor:'rgba(16,185,129,0.8)', borderWidth:1, borderRadius:4 },
        ],
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: { legend:{ labels:{ color:'#7b90c4', font:{size:11} } }, tooltip:{ callbacks:{ label:c => ` ${c.dataset.label}: $${c.raw.toLocaleString()}` } } },
        scales: {
          x:{ ticks:{color:'#7b90c4'}, grid:{color:'rgba(26,40,64,0.7)'} },
          y:{ ticks:{color:'#7b90c4', callback: v => '$'+(v/1000)+'K'}, grid:{color:'rgba(26,40,64,0.7)'} },
        },
      },
    });
    return () => { if (chart.current) { chart.current.destroy(); chart.current = null; } };
  }, []);
  return <div style={{height:220}}><canvas ref={ref} style={{height:'100%'}} /></div>;
}

function WeeklyLineChart() {
  const ref = useRef(null); const chart = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chart.current) { chart.current.destroy(); chart.current = null; }
    chart.current = new Chart(ref.current.getContext('2d'), {
      type: 'line',
      data: {
        labels: REV.weeks.map(w => w.w.split(' ')[0]),
        datasets: [
          { label:'Cumulative', data: REV.weeks.map(w=>w.cum), borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,0.08)', fill:true, tension:0.4, pointRadius:4, pointBackgroundColor:'#3b82f6' },
          { label:'Weekly',     data: REV.weeks.map(w=>w.rev), borderColor:'#10b981', backgroundColor:'transparent', borderDash:[4,3], tension:0.4, pointRadius:3, pointBackgroundColor:'#10b981' },
        ],
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: { legend:{labels:{color:'#7b90c4',font:{size:11}}}, tooltip:{callbacks:{label:c=>` ${c.dataset.label}: $${c.raw.toLocaleString()}`}} },
        scales: {
          x:{ ticks:{color:'#7b90c4'}, grid:{color:'rgba(26,40,64,0.5)'} },
          y:{ ticks:{color:'#7b90c4', callback: v => '$'+(v/1000).toFixed(0)+'K'}, grid:{color:'rgba(26,40,64,0.5)'} },
        },
      },
    });
    return () => { if (chart.current) { chart.current.destroy(); chart.current = null; } };
  }, []);
  return <div style={{height:210}}><canvas ref={ref} style={{height:'100%'}} /></div>;
}

function ExemplarChart({ data }) {
  const ref = useRef(null); const chart = useRef(null);
  useEffect(() => {
    if (!ref.current || !data) return;
    if (chart.current) { chart.current.destroy(); chart.current = null; }
    const bands = data.bands || [];
    chart.current = new Chart(ref.current.getContext('2d'), {
      type: 'bar',
      data: {
        labels: bands.map(b => b.label),
        datasets: [{
          label:'Exemplars',
          data: bands.map(b => b.stem_count),
          backgroundColor: bands.map(b => b.type==='transition' ? 'rgba(139,92,246,0.55)' : 'rgba(59,130,246,0.55)'),
          borderColor: bands.map(b => b.type==='transition' ? 'rgba(139,92,246,0.9)' : 'rgba(59,130,246,0.9)'),
          borderWidth:1, borderRadius:3,
        }],
      },
      options: {
        indexAxis:'y', responsive:true, maintainAspectRatio:false,
        plugins: { legend:{display:false}, tooltip:{callbacks:{label:c=>` ${c.raw} exemplars`}} },
        scales: {
          x:{ ticks:{color:'#7b90c4'}, grid:{color:'rgba(26,40,64,0.6)'} },
          y:{ ticks:{color:'#7b90c4', font:{size:10}}, grid:{display:false} },
        },
      },
    });
    return () => { if (chart.current) { chart.current.destroy(); chart.current = null; } };
  }, [data]);
  return <div style={{height: Math.max(260, (data?.bands?.length||10)*22)}}><canvas ref={ref} style={{height:'100%'}} /></div>;
}
